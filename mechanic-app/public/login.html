<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mechanic Login - IMJ Automoters</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="brand">IMJ <span>Automoters</span></div>
  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<main>
  <section>
    <h2>Mechanic Login</h2>
    <div id="loginMessage"></div>
    <form id="loginForm">
      <label for="username">Username</label>
      <input type="text" id="username" required>

      <label for="password">Password</label>
      <input type="password" id="password" required>

      <button type="submit" class="btn">Log In</button>
    </form>
  </section>
</main>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const msgBox = document.getElementById('loginMessage');

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (res.ok) {
      localStorage.setItem('mechanicToken', data.token);
      window.location.href = 'dashboard.html';
    } else {
      msgBox.innerHTML = `<div class="msg error">${data.error}</div>`;
    }
  } catch (err) {
    msgBox.innerHTML = `<div class="msg error">Something went wrong. Please try again.</div>`;
  }
});
</script>

</body>
</html>
